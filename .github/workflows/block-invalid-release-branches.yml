name: Block Invalid Release Branches

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master

jobs:
  block-invalid-release-pr:
    uses: salva133/My-Workflows/.github/workflows/block-invalid-release-branches.yml@a6dca982fcd1697e4befbb64cafa1e33a331fe4c
    with:
      head_ref: ${{ github.head_ref }}
