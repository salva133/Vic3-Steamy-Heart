name: Bump Build Number

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  bump-build-number:
    if: github.event.pull_request.merged == true
    uses: salva133/My-Workflows/.github/workflows/bump-build-number.yml@4420419345e92b199dcf148a8deeb20de565d3aa
    with:
      pr_number: ${{ github.event.pull_request.number }}
