name: Bump Build Number

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  bump-build-number:
    if: github.event.pull_request.merged == true
    uses: salva133/My-Workflows/.github/workflows/bump-build-number.yml@91a31c01990c581dc0f86b57f08374764feb1702
    with:
      pr_number: ${{ github.event.pull_request.number }}
