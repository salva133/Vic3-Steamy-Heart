l_english:
  puppet_management.2.tt: "[SCOPE.sState('overlord_capital').GetStateRegion.GetCityHubName] Loses Patience"
  puppet_management.2.dd: "Reports from our liaison office confirm what has long been suspected: the government of [SCOPE.sState('overlord_capital').GetStateRegion.GetCityHubName] is growing increasingly irritated with our slow and hesitant approach to socialist reform. From their point of view, half-measures and compromises are no longer acceptable. They expect decisive action and full alignment with their ideological line."
  puppet_management.2.ff: "#italic For some time now, we have observed your conduct with increasing concern. The path of socialist transformation that was agreed upon has been delayed, diluted, and burdened with hesitation. Such timidity stands in stark contrast to the resolve expected from those who claim to stand with us.\n\nOur patience is not limitless. Reform is not a matter for endless debate, nor can it be postponed for the sake of local sensibilities. You are expected to bring your laws, institutions, and political order fully in line with the principles we uphold, and to do so without further delay.\n\nShould you prove unwilling or unable to act decisively, we will draw our own conclusions and respond accordingly. Consider this letter a final reminder of your obligations.#!"
  puppet_management.2.a: "#bold Submit#! to their demands"
  puppet_management.2.b: "#bold Resist#! the pressure and insist on our own path, whatever the consequences"
